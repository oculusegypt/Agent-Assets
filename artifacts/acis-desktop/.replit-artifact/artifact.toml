kind = "web"
previewPath = "/"
title = "ACIS Command Center"
version = "1.0.0"
id = "artifacts/acis-desktop"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20833

[services.development]
run = "pnpm --filter @workspace/acis-desktop run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/acis-desktop", "run", "build" ]
publicDir = "artifacts/acis-desktop/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20833"
BASE_PATH = "/"
