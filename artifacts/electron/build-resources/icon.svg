<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#18181b"/>
      <stop offset="100%" style="stop-color:#09090b"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <linearGradient id="blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="128" cy="128" r="120" fill="url(#bg)" stroke="#27272a" stroke-width="4"/>
  <!-- Film reel outer ring -->
  <circle cx="128" cy="128" r="88" fill="none" stroke="url(#gold)" stroke-width="6" stroke-dasharray="16 8"/>
  <!-- Film reel inner -->
  <circle cx="128" cy="128" r="42" fill="none" stroke="url(#gold)" stroke-width="4"/>
  <!-- Center circle -->
  <circle cx="128" cy="128" r="18" fill="url(#gold)"/>
  <!-- AI neural connections -->
  <line x1="128" y1="40" x2="128" y2="86" stroke="url(#blue)" stroke-width="3" stroke-linecap="round"/>
  <line x1="128" y1="170" x2="128" y2="216" stroke="url(#blue)" stroke-width="3" stroke-linecap="round"/>
  <line x1="40" y1="128" x2="86" y2="128" stroke="url(#blue)" stroke-width="3" stroke-linecap="round"/>
  <line x1="170" y1="128" x2="216" y2="128" stroke="url(#blue)" stroke-width="3" stroke-linecap="round"/>
  <!-- Diagonal connections -->
  <line x1="68" y1="68" x2="97" y2="97" stroke="url(#blue)" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="188" y1="68" x2="159" y2="97" stroke="url(#blue)" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="68" y1="188" x2="97" y2="159" stroke="url(#blue)" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="188" y1="188" x2="159" y2="159" stroke="url(#blue)" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <!-- Node dots -->
  <circle cx="128" cy="40" r="6" fill="url(#blue)"/>
  <circle cx="128" cy="216" r="6" fill="url(#blue)"/>
  <circle cx="40" cy="128" r="6" fill="url(#blue)"/>
  <circle cx="216" cy="128" r="6" fill="url(#blue)"/>
  <circle cx="68" cy="68" r="5" fill="url(#blue)" opacity="0.8"/>
  <circle cx="188" cy="68" r="5" fill="url(#blue)" opacity="0.8"/>
  <circle cx="68" cy="188" r="5" fill="url(#blue)" opacity="0.8"/>
  <circle cx="188" cy="188" r="5" fill="url(#blue)" opacity="0.8"/>
  <!-- ACIS text -->
  <text x="128" y="136" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#fbbf24" letter-spacing="4">ACIS</text>
</svg>
